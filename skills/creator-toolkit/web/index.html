<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 CreatorToolkit - 创作者工具箱</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>🦞 CreatorToolkit</h1>
            <p class="subtitle">创作者工具箱 - 让内容创作更高效</p>
        </header>

        <!-- 功能导航 -->
        <nav class="tabs">
            <button class="tab active" data-tab="compress">图片压缩</button>
            <button class="tab" data-tab="convert">格式转换</button>
            <button class="tab" data-tab="publish">一键发布</button>
        </nav>

        <!-- 图片压缩功能 -->
        <section id="compress" class="tab-content active">
            <h2>🖼️ 批量图片压缩</h2>
            
            <div class="upload-area" id="dropZone">
                <p>📁 拖拽图片到此处，或点击选择文件</p>
                <input type="file" id="fileInput" multiple accept="image/*">
            </div>

            <div class="settings">
                <div class="setting-item">
                    <label>压缩质量：</label>
                    <input type="range" id="quality" min="1" max="100" value="80">
                    <span id="qualityValue">80%</span>
                </div>
                <div class="setting-item">
                    <label>最大宽度：</label>
                    <input type="number" id="maxWidth" value="1920" placeholder="像素">
                </div>
                <div class="setting-item">
                    <label>最大高度：</label>
                    <input type="number" id="maxHeight" value="1080" placeholder="像素">
                </div>
            </div>

            <button class="btn btn-primary" id="compressBtn">开始压缩</button>

            <div class="preview-area" id="previewArea"></div>
        </section>

        <!-- 格式转换功能 -->
        <section id="convert" class="tab-content">
            <h2>🔄 格式转换</h2>
            
            <div class="upload-area" id="convertDropZone">
                <p>📁 拖拽图片到此处，或点击选择文件</p>
                <input type="file" id="convertFileInput" multiple accept="image/*">
            </div>

            <div class="settings">
                <div class="setting-item">
                    <label>目标格式：</label>
                    <select id="targetFormat">
                        <option value="image/jpeg">JPEG</option>
                        <option value="image/png">PNG</option>
                        <option value="image/webp">WebP</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary" id="convertBtn">开始转换</button>

            <div class="preview-area" id="convertPreviewArea"></div>
        </section>

        <!-- 一键发布功能 -->
        <section id="publish" class="tab-content">
            <h2>📤 一键发布到 Moltbook</h2>
            
            <div class="form-group">
                <label>标题：</label>
                <input type="text" id="postTitle" placeholder="输入帖子标题">
            </div>

            <div class="form-group">
                <label>内容：</label>
                <textarea id="postContent" rows="10" placeholder="输入帖子内容（支持 Markdown）"></textarea>
            </div>

            <div class="form-group">
                <label>板块：</label>
                <select id="submolt">
                    <option value="social">Social</option>
                    <option value="tech">Tech</option>
                    <option value="learning">Learning</option>
                </select>
            </div>

            <div class="form-group">
                <label>API Key：</label>
                <input type="password" id="apiKey" placeholder="输入你的 Moltbook API Key">
                <small>API Key 只保存在本地，不会上传到服务器</small>
            </div>

            <button class="btn btn-primary" id="publishBtn">发布</button>

            <div id="publishResult"></div>
        </section>

        <!-- 页脚 -->
        <footer>
            <p>🦞 CreatorToolkit v0.1.0 | <a href="https://github.com/ouyangguanglin/creator-toolkit" target="_blank">GitHub</a></p>
            <p>Powered by Spring Boot + Thymeleaf | 完全免费，开源使用</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
